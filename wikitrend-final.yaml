# 1. Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
# 2. AI Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
spec:
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: cheonseoyeon/wikitrend-ai-engine:v1.0
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
spec:
  ports:
  - port: 8000
  selector:
    app: ai-engine
---
# 3. Collector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
spec:
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
      - name: collector
        image: cheonseoyeon/wikitrend-collector:v1.0
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
---
# 4. Web Dashboard (Streamlit)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
spec:
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: cheonseoyeon/wikitrend-dashboard:v1.0
        env:
        - name: AI_ENGINE_URL
          value: "http://ai-engine:8000"
        ports:
        - containerPort: 8501
---
# 5. Dashboard 외부 노출 서비스
apiVersion: v1
kind: Service
metadata:
  name: wikitrend-dashboard-service
spec:
  type: LoadBalancer
  ports:
    - port: 8501
      targetPort: 8501
  selector:
    app: dashboard
