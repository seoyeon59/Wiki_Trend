# 1. Redis (Database)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis # 도커 컴포즈의 REDIS_HOST=redis와 매칭됨
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
# 2. AI Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
spec:
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: wikitrend/ai-engine:v1.0
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine # Dashboard에서 AI_ENGINE_URL로 찾을 이름
spec:
  ports:
  - port: 8000
  selector:
    app: ai-engine
---
# 3. Collector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
spec:
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
      - name: collector
        image: wikitrend/collector:v1.0
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
---
# 4. Web Dashboard (Streamlit)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
spec:
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: wikitrend/dashboard:v1.0
        env:
        - name: AI_ENGINE_URL
          value: "http://ai-engine:8000"
        ports:
        - containerPort: 8501
---
# 5. Frontend (React)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: wikitrend/frontend:v1.0
        ports:
        - containerPort: 80
---
# 6. 외부 접속용 서비스 (Frontend용)
apiVersion: v1
kind: Service
metadata:
  name: wikitrend-frontend-service
spec:
  type: LoadBalancer # 외부에서 접속 가능하게 함
  ports:
    - port: 3000
      targetPort: 80
  selector:
    app: frontend