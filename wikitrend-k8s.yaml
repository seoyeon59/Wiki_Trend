# 1. Redis (데이터베이스)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
# 2. AI Engine (분석 엔진)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
spec:
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      containers:
      - name: ai-engine
        image: wikitrend/ai-engine:v1.0
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-engine
spec:
  ports:
  - port: 8000
  selector:
    app: ai-engine
---
# 3. Collector (데이터 수집기)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
spec:
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
      - name: collector
        image: wikitrend/collector:v1.0
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
---
# 4. Web Dashboard (Streamlit - 실제 외부 노출 대상)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
spec:
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: wikitrend/dashboard:v1.0
        env:
        - name: AI_ENGINE_URL
          value: "http://ai-engine:8000"
        ports:
        - containerPort: 8501
---
# 5. Frontend (필요한 경우 대비하여 유지)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: wikitrend/frontend:v1.0
        ports:
        - containerPort: 80
---
# 6. 서비스 (대시보드 외부 노출용)
apiVersion: v1
kind: Service
metadata:
  name: wikitrend-dashboard-service
spec:
  type: LoadBalancer
  ports:
    - port: 8501        # 외부에서 접속할 포트
      targetPort: 8501  # 대시보드 컨테이너 내부 포트
  selector:
    app: dashboard      # ★ 중요: frontend 대신 dashboard를 지목 ★