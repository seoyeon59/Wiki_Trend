name: GKE Deploy

on:
  push:
    branches: [ "master" ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # [1] GCP 로그인
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # [2] 도커 이미지 빌드 및 푸시 (4개 서비스 각각 진행)
    - name: Build and Push Docker Images
      run: |
        gcloud auth configure-docker --quiet
        
        # 1번 서비스 
        docker build -f ./ai-engine/Dockerfile -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-ai:latest ./ai-folder
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-ai:latest
        
        # 2번 서비스 
        docker build -f ./web_dashboard/Dockerfile -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-back:latest ./back-folder
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-back:latest
        
        # 3번 서비스 
        docker build -f ./frontend/Dockerfile -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-front:latest ./front-folder
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-front:latest
        
        # 4번 서비스 
        docker build -f ./collector/Dockerfile -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-data:latest ./data-folder
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-data:latest

    # [3] 쿠버네티스 배포 (모든 서비스 재시작)
    - name: Deploy to GKE
      run: |
        # 클러스터 정보 확인 필수!
        gcloud container clusters get-credentials wiki-cluster --zone us-central1-a
        
        # 각 서비스의 deployment 이름을 넣어주세요
        kubectl rollout restart deployment/ai-deployment
        kubectl rollout restart deployment/back-deployment
        kubectl rollout restart deployment/front-deployment
        kubectl rollout restart deployment/data-deployment
