name: GKE Deploy

on:
  push:
    branches: [ "master" ] # 브랜치 이름이 'main'인지 'master'인지 꼭 확인하세요!

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: # [추가] WIF 인증을 위해 이 권한 설정이 꼭 필요합니다!
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v4 # 최신 버전 v4 권장

    # [1] GCP 로그인: 예전의 credentials_json 대신 WIF 주소를 사용합니다!
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }} # 아까 복사한 긴 주소
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }} # 서비스 계정 이메일

    # [2] 도커 이미지 빌드 및 푸시
    - name: Build and Push Docker
      run: |
        gcloud auth configure-docker --quiet
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-app:latest .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiki-app:latest

    # [3] 쿠버네티스 배포
    - name: Deploy to GKE
      run: |
        # 클러스터 이름(wiki-cluster)과 지역(us-central1-a)이 실제와 맞는지 확인 필수!
        gcloud container clusters get-credentials wiki-cluster --zone us-central1-a
        kubectl rollout restart deployment/wiki-deployment
