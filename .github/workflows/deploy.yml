name: GKE Deploy

on:
  push:
    branches: [ "master" ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # [1] GCP 로그인
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # [2] 도커 이미지 빌드 및 푸시
    - name: Build and Push Docker Images
      run: |
        gcloud auth configure-docker us-docker.pkg.dev --quiet
        
        # requirements.txt를 각 폴더로 복사
        cp requirements.txt ./web_dashboard/
        cp requirements.txt ./ai_engine/
        cp requirements.txt ./collector/
        
        # 1. 웹 대시보드 빌드
        docker build -f ./web_dashboard/Dockerfile -t us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/wikitrend-dashboard:latest ./web_dashboard
        docker push us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/wikitrend-dashboard:latest
        
        # 2. AI 엔진 빌드
        docker build -f ./ai_engine/Dockerfile -t us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/wikitrend-ai-engine:latest ./ai_engine
        docker push us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/wikitrend-ai-engine:latest
        
        # 3. 데이터 수집기 빌드
        docker build -f ./collector/Dockerfile -t us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/wikitrend-collector:latest ./collector
        docker push us-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gcr.io/wikitrend-collector:latest
    
    # [3] 쿠버네티스 배포 (서비스 업데이트)
    - name: Deploy to GKE
      run: |
        gcloud container clusters get-credentials wiki-cluster --zone us-central1-a
        
        # Deployment 이름이 실제 GKE에 설정된 이름과 맞는지 꼭 확인하세요!
        kubectl rollout restart deployment/dashboard-deployment
        kubectl rollout restart deployment/ai-engine-deployment
        kubectl rollout restart deployment/collector-deployment
