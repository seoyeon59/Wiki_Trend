name: GKE Deploy

on:
  push:
    branches: [ "master" ] 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # [1] GCP 로그인
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # [2] 도커 이미지 빌드 및 푸시
    - name: Build and Push Docker Images
      run: |
        # 1. 인증 설정을 리전 주소에 맞게 초기화
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

        # requirements.txt를 각 폴더로 복사
        cp requirements.txt ./web_dashboard/
        cp requirements.txt ./ai_engine/
        cp requirements.txt ./collector/
        
        # 2. 이미지 주소에서 gcr.io를 빼고 리전 기반 주소로 변경
        # 형식: [지역]-docker.pkg.dev/[프로젝트ID]/[저장소이름]/[이미지명]
        
        # 웹 대시보드
        docker build -f ./web_dashboard/Dockerfile -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/wiki-repo/dashboard:latest ./web_dashboard
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/wiki-repo/dashboard:latest
        
        # AI 엔진
        docker build -f ./ai_engine/Dockerfile -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/wiki-repo/ai-engine:latest ./ai_engine
        docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/wiki-repo/ai-engine:latest
    
    # [3] 쿠버네티스 배포 (서비스 업데이트)
    - name: Deploy to GKE
      run: |
        gcloud container clusters get-credentials wiki-cluster --zone us-central1-a
        
        # Deployment 이름이 실제 GKE에 설정된 이름과 맞는지 꼭 확인하세요!
        kubectl rollout restart deployment/dashboard-deployment
        kubectl rollout restart deployment/ai-engine-deployment
        kubectl rollout restart deployment/collector-deployment
